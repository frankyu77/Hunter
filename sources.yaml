# JobPoll watchlist. User-editable; contains no secrets, so the repo can be
# public. Adding a company of an existing type = one entry under `sources:`.
#
# Migration trap: before adding a company, confirm its Apply links actually
# point at that ATS. A board a company migrated away from returns 200 with
# zero jobs forever (e.g. deel, mercury, kraken, and plaid all have empty
# abandoned boards). Probe first:
#   ashby:      https://api.ashbyhq.com/posting-api/job-board/{company}
#   greenhouse: https://boards-api.greenhouse.io/v1/boards/{company}/jobs
#   lever:      https://api.lever.co/v0/postings/{company}?mode=json
#
# FAANG (Meta/Apple/Amazon/Netflix/Google) run custom career sites with no
# public board API - their new-grad roles arrive via the SimplifyJobs feed
# below instead.

sources:
  # --- fintech ---
  - type: ashby
    company: wealthsimple
  - type: ashby
    company: ramp
  - type: ashby
    company: column
  - type: greenhouse
    company: stripe
  - type: greenhouse
    company: coinbase
  - type: greenhouse
    company: robinhood
  - type: greenhouse
    company: affirm
  - type: greenhouse
    company: chime
  - type: greenhouse
    company: brex
  - type: greenhouse
    company: adyen
  - type: greenhouse
    company: block

  # --- tech ---
  - type: ashby
    company: openai
  - type: ashby
    company: linear
  - type: ashby
    company: cursor
  - type: greenhouse
    company: anthropic
  - type: greenhouse
    company: databricks
  - type: greenhouse
    company: figma
  - type: greenhouse
    company: vercel
  - type: greenhouse
    company: duolingo
  - type: greenhouse
    company: asana
  - type: greenhouse
    company: dropbox
  - type: greenhouse
    company: hootsuite
  - type: greenhouse
    company: janestreet
  - type: lever
    company: palantir

  # --- workday boards ---
  # Config comes straight from the board URL: for
  # https://ngc.wd1.myworkdayjobs.com/Northrop_Grumman_External_Site
  # tenant=ngc, host=wd1, site=Northrop_Grumman_External_Site. Probe first:
  #   POST https://{tenant}.{host}.myworkdayjobs.com/wday/cxs/{tenant}/{site}/jobs
  #   body {"appliedFacets":{},"limit":1,"offset":0,"searchText":""}
  # Only the ~200 newest postings are fetched per run, which is plenty for
  # a frequent poller even on boards with thousands of openings.
  - type: workday
    company: northrop-grumman
    tenant: ngc
    host: wd1
    site: Northrop_Grumman_External_Site
  - type: workday
    company: boeing
    tenant: boeing
    host: wd1
    site: EXTERNAL_CAREERS
  - type: workday
    company: becton-dickinson
    tenant: bdx
    host: wd1
    site: EXTERNAL_CAREER_SITE_USA
  - type: workday
    company: siemens-healthineers
    tenant: onehealthineers
    host: wd3
    site: SHSJB
  - type: workday
    company: salesforce
    tenant: salesforce
    host: wd12
    site: External_Career_Site
  - type: workday
    company: clio
    tenant: clio
    host: wd3
    site: ClioCareerSite
  - type: workday
    company: td
    tenant: td
    host: wd3
    site: TD_Bank_Careers
  - type: workday
    company: cibc
    tenant: cibc
    host: wd3
    site: search
  # RBC's general board (jobs.rbc.com) is a custom site; only the early
  # talent board (internships / new grad) is on Workday - ideal here anyway.
  - type: workday
    company: rbc
    tenant: rbc
    host: wd3
    site: RBCEARLYTALENT1

  # --- cross-company aggregators (cover FAANG and hundreds more) ---
  - type: github
    repo: SimplifyJobs/New-Grad-Positions
    path: .github/scripts/listings.json
    branch: dev
  - type: github
    repo: SimplifyJobs/Summer2026-Internships
    path: .github/scripts/listings.json
    branch: dev
  # vansh's fork of the Simplify list, same schema. GitHub renames follow
  # redirects, so use the canonical name (Summer2026 redirects here) or the
  # ETag cache keys drift. Covers Summer 2026 AND 2027 listings.
  - type: github
    repo: vanshb03/Summer2027-Internships
    path: .github/scripts/listings.json
    branch: dev

# Filters target graduate / junior software roles (SWE, full stack, backend,
# platform, SRE, forward deployed) plus internships. Matching is
# case-insensitive SUBSTRING on the title - keywords like "sr " use spacing
# on purpose so they don't swallow "SRE".
filters:
  include_keywords: [engineer, developer, software, sre, intern, internship, co-op, coop]
  exclude_keywords:
    - senior
    - "sr."
    - "sr "
    - staff
    - principal
    - distinguished
    - architect
    - lead
    - manager
    - director
    - "head of"
    - "vp "
  # Uncomment to keep only jobs whose location mentions one of these.
  # locations: [remote, toronto, new york]
  # Drop jobs whose posted date is older than this. Aggregator repos backfill
  # month-old postings that would otherwise alert as "new"; undated jobs pass.
  max_age_days: 14
  # More than this many new matches in one run -> one digest message.
  digest_threshold: 10
